name: CI Pipeline

on:
  push:
    branches:
      - main

jobs:
  docker-build-push:
    runs-on: ubuntu-latest

    outputs:
      image_tag: ${{ steps.set-outputs.outputs.image_tag }}
      ecr_registry: ${{ steps.set-outputs.outputs.ecr_registry }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Build WAR using Maven
        run: mvn clean package -DskipTests

      - name: Verify WAR File
        run: ls -la target/

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-south-2

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and Push Docker Image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: vprofile-appimage
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build \
            -f Docker-files/app/Dockerfile \
            -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG \
            .

          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG

      - name: Set Outputs for Helm Job
        id: set-outputs
        run: |
          echo "image_tag=${{ github.sha }}" >> $GITHUB_OUTPUT
          echo "ecr_registry=${{ steps.login-ecr.outputs.registry }}" >> $GITHUB_OUTPUT

  update-helm:
    needs: docker-build-push
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Helm Repository
        uses: actions/checkout@v4

      - name: Setup Helm
        uses: azure/setup-helm@v4
        with:
          version: 'v3.12.0'

      - name: Update Helm Values with New Image Details
        env:
          IMAGE_TAG: ${{ needs.docker-build-push.outputs.image_tag }}
          ECR_REGISTRY: ${{ needs.docker-build-push.outputs.ecr_registry }}
        run: |
          echo "Updating Helm charts with Registry: $ECR_REGISTRY and Tag: $IMAGE_TAG"

          # Example:
          # sed -i "s|repository:.*|repository: $ECR_REGISTRY/vprofile-app|g" values.yaml
          # sed -i "s|tag:.*|tag: $IMAGE_TAG|g" values.yaml

          # Add git commit/push commands here if using a separate GitOps repository.
